<!--
  Goals overview page.

  Renders two separate grids built by GoalViewController.showGoals:
    - ${activeGoals}: goals whose calculated progressPercentage is below 100
    - ${completedGoals}: goals whose progressPercentage has reached 100

  Each goal card shows its title, associated category name, raw
  progress/target hours, a visual progress bar (filled via inline
  width style bound to progressPercentage), and the percentage value.
  Completed cards get an extra ".completed" class for a distinct border style.
-->



<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mis Metas</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <link rel="stylesheet"
          th:href="@{/css/goalsPage.css}">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}">
    </div>

    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}">
        </div>

        <div class="activities-container">

            <h1>

                🎯 Mis Metas

            </h1>

            <a th:href="@{/newGoal}"
               class="new-activity">

                + Nueva meta

            </a>

            <!-- ============================= -->
            <!-- EN PROGRESO -->
            <!-- ============================= -->

            <h2>

                🚀 En progreso

            </h2>

            <div class="goals-grid">

                <div class="goal-card"
                     th:each="goal : ${activeGoals}">

                    <div class="goal-header">

                        <h3 th:text="${goal.title}">
                        </h3>

                        <span class="badge-progress">

                            En progreso

                        </span>

                    </div>

                    <p>

                        <strong>Categoría:</strong>

                        <span th:text="${goal.categoryName}">
                        </span>

                    </p>

                    <p>

                        <strong>

                            <span th:text="${goal.progress}">
                            </span>

                            /

                            <span th:text="${goal.target}">
                            </span>

                            h

                        </strong>

                    </p>

                    <div class="progress-bar">

                        <div class="progress-fill"

                             th:style="'width:' + ${goal.progressPercentage} + '%'">

                        </div>

                    </div>

                    <p style="margin-top:10px;">

                        <strong>

                            <span th:text="${goal.progressPercentage}">
                            </span>%

                        </strong>

                    </p>

                    <div style="margin-top:20px;">

                        <a class="action-edit"
                           th:href="@{/editGoal/{id}(id=${goal.id})}">

                            ✏️ Editar

                        </a>

                        &nbsp;

                        <a class="action-delete"
                           th:href="@{/deleteGoal/{id}(id=${goal.id})}"

                           onclick="return confirm('¿Desea eliminar esta meta?')">

                            🗑️ Eliminar

                        </a>

                    </div>

                </div>

            </div>


            <!-- ============================= -->
            <!-- COMPLETADAS -->
            <!-- ============================= -->

            <h2 style="margin-top:60px;">

                ✅ Completadas

            </h2>

            <div class="goals-grid">

                <div class="goal-card completed"

                     th:each="goal : ${completedGoals}">

                    <div class="goal-header">

                        <h3 th:text="${goal.title}">
                        </h3>

                        <span class="badge-completed">

                            Completada

                        </span>

                    </div>

                    <p>

                        <strong>Categoría:</strong>

                        <span th:text="${goal.categoryName}">
                        </span>

                    </p>

                    <p>

                        <strong>

                            <span th:text="${goal.progress}">
                            </span>

                            /

                            <span th:text="${goal.target}">
                            </span>

                            h

                        </strong>

                    </p>

                    <div class="progress-bar">

                        <div class="progress-fill"

                             th:style="'width:' + ${goal.progressPercentage} + '%'">

                        </div>

                    </div>

                    <p style="margin-top:10px; color:green;">

                        <strong>

                            <span th:text="${goal.progressPercentage}">
                            </span>%

                        </strong>

                    </p>

                    <div style="margin-top:20px;">

                        <a class="action-edit"
                           th:href="@{/editGoal/{id}(id=${goal.id})}">

                            ✏️ Editar

                        </a>

                        &nbsp;

                        <a class="action-delete"
                           th:href="@{/deleteGoal/{id}(id=${goal.id})}"

                           onclick="return confirm('¿Desea eliminar esta meta?')">

                            🗑️ Eliminar

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
