<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nueva Actividad</title>

    <!-- CSS -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <link rel="stylesheet"
          th:href="@{/css/activityForm.css}">

</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>


        <!-- Contenido principal -->
        <div class="main-content">

            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}">
            </div>


            <!-- Formulario -->
            <div class="form-container">

                <h1>
                    📋 Nueva Actividad
                </h1>

                <form th:action="@{/saveActivity}"
                      th:object="${activity}"
                      method="post">


                    <!-- Título -->
                    <label>Título</label>

                    <input type="text"
                           th:field="*{title}"
                           required>


                    <!-- Descripción -->
                    <label>Descripción</label>

                    <input type="text"
                           th:field="*{description}">


                    <!-- Fecha -->
                    <label>Fecha</label>

                    <input type="date"
                           th:field="*{activityDate}">


                    <!-- Hora de inicio -->
                    <label>Hora de inicio</label>

                    <input type="time"
                           th:field="*{startTime}">


                    <!-- Hora final -->
                    <label>Hora final</label>

                    <input type="time"
                           th:field="*{endTime}">


                    <!-- Horas planificadas -->
                    <label>Horas planificadas</label>

                    <input type="number"
                           step="0.5"
                           th:field="*{plannedHours}">


                    <!-- Horas reales -->
                    <label>Horas reales</label>

                    <input type="number"
                           step="0.5"
                           th:field="*{realHours}">


                    <!-- Prioridad -->
                    <label>Prioridad</label>

                    <select th:field="*{priority}">

                        <option value="LOW">
                            Baja
                        </option>

                        <option value="MEDIUM">
                            Media
                        </option>

                        <option value="HIGH">
                            Alta
                        </option>

                    </select>


                    <!-- Estado -->
                    <label>Estado</label>

                    <select th:field="*{status}">

                        <option value="NOT_COMPLETED">
                            No completada
                        </option>

                        <option value="PARTIALLY_COMPLETED">
                            Parcialmente completada
                        </option>

                        <option value="COMPLETED">
                            Completada
                        </option>

                    </select>


                    <!-- Botón Guardar -->
                    <button type="submit">

                        Guardar actividad

                    </button>


                    <!-- Regresar -->
                    <a th:href="@{/activitiesPage}">

                        Volver a actividades

                    </a>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
