<!DOCTYPE html>
<html lang="es">
<!--
  Activity create/edit form.

  Bound to the "activity" model attribute (a new Activity for creation,
  or an existing one populated by ActivityViewController.editActivity for editing).

  Category is the only required association. Course, Movie, and Trip are
  optional one-of associations: the controller clears all three before
  applying the one selected, so picking one logically implies "none" for
  the other two even though the form does not enforce mutual exclusivity
  client-side.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Activity</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/activityForm.css}">
</head>

<body>

    <div class="container">

        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        <div class="main-content">

            <div th:replace="~{fragments/navbar :: navbar}">
            </div>

            <div class="form-container">

                <h1>
                    📋 New Activity
                </h1>

                <form th:action="@{/saveActivity}"
                      th:object="${activity}"
                      method="post">

                    <!-- Hidden id: empty for a new activity, populated when editing -->
                    <input type="hidden" th:field="*{id}">

                    <label>Title</label>
                    <input type="text" th:field="*{title}" required>

                    <label>Description</label>
                    <input type="text" th:field="*{description}">

                    <label>Date</label>
                    <input type="date" th:field="*{activityDate}" required>

                    <label>Start time</label>
                    <input type="time" th:field="*{startTime}" required>

                    <label>End time</label>
                    <input type="time" th:field="*{endTime}" required>

                    <label>Planned hours</label>
                    <input type="number" step="0.5" th:field="*{plannedHours}">

                    <label>Real hours</label>
                    <input type="number" step="0.5" th:field="*{realHours}">

                    <!-- Category: required association, populated from CategoryService.getAllCategories() -->
                    <label>Category</label>
                    <select th:field="*{category.id}" required>
                        <option value="">
                            Select a category
                        </option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.icon + ' ' + category.name}">
                        </option>
                    </select>

                    <!-- Course: optional association, scoped to the current user -->
                    <label>Course</label>
                    <select name="course.id">
                        <option value="">
                            No course
                        </option>
                        <option th:each="course : ${courses}"
                                th:value="${course.id}"
                                th:text="${course.name}">
                        </option>
                    </select>

                    <!-- Movie: optional association, scoped to the current user -->
                    <label>Movie</label>
                    <select name="movie.id">
                        <option value="">
                            No movie
                        </option>
                        <option th:each="movie : ${movies}"
                                th:value="${movie.id}"
                                th:text="${movie.title}">
                        </option>
                    </select>

                    <!-- Trip: optional association, scoped to the current user. If selected and no
                         date was provided, the controller auto-fills activityDate from the trip's
                         departure date. -->
                    <label>Trip</label>
                    <select name="trip.id">
                        <option value="">
                            No trip
                        </option>
                        <option th:each="trip : ${trips}"
                                th:value="${trip.id}"
                                th:text="${trip.destination}">
                        </option>
                    </select>

                    <label>Priority</label>
                    <select th:field="*{priority}">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                    </select>

                    <!-- Hidden default status: overridden in editActivity if the activity already has a different status -->
                    <input type="hidden" th:field="*{status}" value="PENDING">

                    <button type="submit">
                        Save activity
                    </button>

                    <a th:href="@{/activitiesPage}">
                        Back to activities
                    </a>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
