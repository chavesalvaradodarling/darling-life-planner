<!--
==============================================================================
File: plannings.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page displays the Planning Management module of the Darling Life Planner
application. It allows users to organize and manage their planning records by
viewing, creating, editing, and deleting planning entries. Each planning
contains essential information such as its name, description, goal, planning
type, and execution period. The data is dynamically retrieved from the backend
using Thymeleaf.

Main Features:
- Displays a complete list of registered planning records.
- Shows detailed information for each planning, including:
  • Planning name
  • Description
  • Goal
  • Planning type
  • Start date
  • End date
- Allows users to create a new planning.
- Provides options to edit or delete existing planning records.
- Displays a confirmation dialog before deleting a planning.
- Uses Thymeleaf to dynamically render planning information from the backend.
- Integrates the shared sidebar and navigation bar fragments to provide a
  consistent navigation and user interface throughout the application.


==============================================================================
-->


<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mis Planificaciones</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <link rel="stylesheet"
          th:href="@{/css/plannings.css}">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}">
    </div>

    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}">
        </div>

        <div class="activities-container">

            <h1>

                📅 Mis Planificaciones

            </h1>


            <!-- Botón -->
            <a th:href="@{/newPlanning}"
               class="new-activity">

                + Nueva planificación

            </a>


            <!-- Tabla -->
            <table>

                <thead>

                    <tr>

                        <th>Nombre</th>

                        <th>Descripción</th>

                        <th>Meta</th>

                        <th>Tipo</th>

                        <th>Inicio</th>

                        <th>Fin</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody>

                    <tr th:each="planning : ${plannings}">

                        <td th:text="${planning.name}">
                        </td>

                        <td th:text="${planning.description}">
                        </td>

                        <td th:text="${planning.goal}">
                        </td>

                        <td th:text="${planning.type}">
                        </td>

                        <td th:text="${planning.startDate}">
                        </td>

                        <td th:text="${planning.endDate}">
                        </td>

                        <td>

                            <a class="action-edit"
                               th:href="@{/editPlanning/{id}(id=${planning.id})}">

                                ✏️ Editar

                            </a>

                            &nbsp;

                            <a class="action-delete"
                               th:href="@{/deletePlanning/{id}(id=${planning.id})}"

                               onclick="return confirm('¿Desea eliminar esta planificación?')">

                                🗑️ Eliminar

                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
