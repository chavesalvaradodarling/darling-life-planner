<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nueva Configuración</title>

    <!-- CSS principal -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <!-- Sidebar -->
    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <!-- Navbar -->
    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <!-- Formulario -->
    <link rel="stylesheet"
          th:href="@{/css/settingsForm.css}">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}">
    </div>

    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}">
        </div>

        <div class="form-container">

            <h1>

                ⚙ Configuración

            </h1>

            <form th:action="@{/saveSettings}"
                  th:object="${settings}"
                  method="post">

                <!-- Id oculto -->
                <input type="hidden"
                       th:field="*{id}">


                <!-- Tema -->
                <label>

                    Tema

                </label>

                <input type="text"
                       th:field="*{theme}">


                <!-- Color principal -->
                <label>

                    Color principal

                </label>

                <input type="text"
                       th:field="*{mainColor}">


                <!-- Mostrar calendario -->
                <label>

                    Mostrar calendario

                </label>

                <input type="checkbox"
                       th:field="*{showCalendar}">


                <!-- Mostrar gráficos -->
                <label>

                    Mostrar gráficos

                </label>

                <input type="checkbox"
                       th:field="*{showCharts}">


                <!-- Notificaciones -->
                <label>

                    Activar notificaciones

                </label>

                <input type="checkbox"
                       th:field="*{notifications}">


                <button type="submit">

                    Guardar configuración

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
