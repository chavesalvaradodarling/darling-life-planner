<!--
==============================================================================
File: login.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page provides the user authentication interface for the Darling Life
Planner application. It allows registered users to securely sign in using
their email address and password. The page is integrated with Spring Security
and Thymeleaf to process authentication requests and display status messages
based on the login result.

Main Features:
- Displays the user login form.
- Allows users to authenticate using their email address and password.
- Submits login credentials securely to the Spring Security authentication
  endpoint.
- Displays an error message when the authentication process fails.
- Displays a confirmation message after a successful logout.
- Provides a navigation link to the user registration page for new users.
- Uses Thymeleaf to dynamically display authentication status messages.


==============================================================================
-->





<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Permite usar caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Hace que la página sea adaptable a celulares -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>Iniciar sesión - Darling Life Planner</title>

    <!-- CSS -->
    <link rel="stylesheet"
          th:href="@{/css/login.css}">

</head>

<body>

    <div class="login-container">

        <!-- Nombre de la aplicación -->
        <h1>

            Darling Life Planner 🌸

        </h1>

        <!-- Mensaje -->
        <h2>

            Bienvenido de nuevo

        </h2>

        <!-- Mensaje de error -->
        <p
            style="color:red"
            th:if="${param.error}">

            Correo o contraseña incorrectos

        </p>
        <p
            style="color:green"
            th:if="${param.logout}">

            Sesión cerrada correctamente

        </p>

        <!-- Formulario -->
        <form
              th:action="@{/login}"
              method="post">

            <!-- Correo -->
            <label>

                Correo electrónico

            </label>

            <input
                    type="email"

                    name="email"

                    placeholder="Ingrese su correo"

                    required>

            <!-- Contraseña -->
            <label>

                Contraseña

            </label>

            <input
                    type="password"

                    name="password"

                    placeholder="Ingrese su contraseña"

                    required>

            <!-- Botón -->
            <button type="submit">

                Iniciar sesión

            </button>

        </form>

        <!-- Registrarse -->
        <p>

            ¿No tienes cuenta?

            <a th:href="@{/register}">

                Registrarse

            </a>

        </p>

    </div>

</body>

</html>
