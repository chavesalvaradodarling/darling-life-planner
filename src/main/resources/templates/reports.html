<!--
==============================================================================
File: reports.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page displays the Reports dashboard of the Darling Life Planner
application. It provides users with a summarized overview of their planning
performance by presenting key statistics and productivity metrics. The report
information is dynamically generated using Spring Boot and Thymeleaf, allowing
real-time visualization of activity data retrieved from the system.

Main Features:
- Displays the total number of registered activities.
- Shows the number of completed and pending activities.
- Presents the total hours dedicated to each category.
- Calculates and displays the overall completion percentage.
- Integrates the common sidebar and navigation bar fragments.
- Uses Thymeleaf expressions to render dynamic report data from the backend.


==============================================================================
-->



<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reportes</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <link rel="stylesheet"
          th:href="@{/css/reports.css}">

</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        <!-- Contenido principal -->
        <div class="main-content">

            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}">
            </div>

            <div class="reports-container">

                <h1>
                    📊 Reportes
                </h1>

                <!-- Total de actividades -->
                <div class="report-card">

                    <h3>
                        📋 Total de actividades
                    </h3>

                    <h2 th:text="${report.totalActivities}">
                    </h2>

                </div>

                <!-- Actividades completadas -->
                <div class="report-card">

                    <h3>
                        ✅ Actividades completadas
                    </h3>

                    <h2 th:text="${report.completedActivities}">
                    </h2>

                </div>

                <!-- Actividades pendientes -->
                <div class="report-card">

                    <h3>
                        ❌ Actividades pendientes
                    </h3>

                    <h2 th:text="${report.pendingActivities}">
                    </h2>

                </div>

                <!-- Horas por categoría (DINÁMICO) -->
                <div class="report-card"
                     th:each="category : ${report.hoursPerCategory}">

                    <h3>

                        ⭐ <span th:text="${category.key}">
                        </span>

                    </h3>

                    <h2 th:text="${category.value} + ' h'">
                    </h2>

                </div>

                <!-- Cumplimiento -->
                <div class="report-card">

                    <h3>
                        📈 Porcentaje de cumplimiento
                    </h3>

                    <h2 th:text="${#numbers.formatDecimal(report.completionPercentage,1,2)} + '%'">
                    </h2>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
