<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<!--
  Activity list page.

  Displays every activity belonging to the logged-in user
  (provided by ActivityViewController as the "activities" model attribute)
  in a table, along with category, priority, status, and hour tracking.

  Each row offers actions to edit, mark as completed (only if not
  already COMPLETED), or delete the activity.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Activities</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/activities.css}">
</head>
<body>

    <div class="container">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="main-content">
            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <div class="activities-container">
                <h1 style="color: var(--text-title); transition: color 0.3s ease;">
                    📋 My Activities
                </h1>

                <a th:href="@{/newActivity}" class="new-activity">
                    + New activity
                </a>

                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Planned hours</th>
                            <th>Real hours</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="activity : ${activities}">
                            <td th:text="${activity.title}"></td>

                            <td th:text="${activity.activityDate}"></td>

                            <!-- Show the category's icon and name, or a placeholder if none assigned -->
                            <td>
                                <span th:if="${activity.category != null}"
                                      th:text="${activity.category.icon + ' ' + activity.category.name}">
                                </span>
                                <span th:if="${activity.category == null}">
                                    No category
                                </span>
                            </td>

                            <!-- Priority badge: only one of these three spans renders, based on the activity's priority field -->
                            <td>
                                <span class="high-priority" th:if="${activity.priority == 'HIGH'}">
                                    🔴 High
                                </span>
                                <span class="medium-priority" th:if="${activity.priority == 'MEDIUM'}">
                                    🟠 Medium
                                </span>
                                <span class="low-priority" th:if="${activity.priority == 'LOW'}">
                                    🟢 Low
                                </span>
                            </td>

                            <!-- Status badge: mirrors the priority pattern, one span per possible status value -->
                            <td>
                                <span class="completed" th:if="${activity.status == 'COMPLETED'}">
                                    ✅ Completed
                                </span>
                                <span class="partial" th:if="${activity.status == 'PARTIALLY_COMPLETED'}">
                                    🟡 Partially completed
                                </span>
                                <span class="not-completed" th:if="${activity.status == 'NOT_COMPLETED'}">
                                    ❌ Not completed
                                </span>
                            </td>

                            <td th:text="${activity.plannedHours}"></td>

                            <td th:text="${activity.realHours}"></td>

                            <td>
                                <a class="action-edit" th:href="@{/editActivity/{id}(id=${activity.id})}">
                                    ✏️ Edit
                                </a>
                                <br><br>

                                <!-- "Complete" action is hidden once the activity is already COMPLETED -->
                                <a class="action-complete" th:if="${activity.status != 'COMPLETED'}"
                                   th:href="@{/completeActivity/{id}(id=${activity.id})}"
                                   onclick="return confirm('Mark this activity as completed?')">
                                    ✅ Complete
                                </a>
                                <div th:if="${activity.status != 'COMPLETED'}">
                                    <br><br>
                                </div>

                                <a class="action-delete" th:href="@{/deleteActivity/{id}(id=${activity.id})}"
                                   onclick="return confirm('Delete this activity?')">
                                    🗑️ Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
