<!--
==============================================================================
File: register.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page provides the user registration interface for the Darling Life Planner
application. It allows new users to create an account by entering their full
name, email address, and password. The form is integrated with Spring Boot and
Thymeleaf to bind user data and submit it securely to the registration
controller. The page also includes a navigation link that redirects existing
users to the login page.

Main Features:
- Displays the user registration form.
- Collects personal information required for account creation.
- Uses Thymeleaf for form binding and URL generation.
- Sends registration data to the server using the POST method.
- Provides quick access to the login page for existing users.


==============================================================================
-->


<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Permite caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Adaptable a dispositivos móviles -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Título de la página -->
    <title>Registro - Darling Life Planner</title>

    <!-- Conecta con register.css -->
    <link rel="stylesheet"
          th:href="@{/css/register.css}">

</head>

<body>

    <!-- Contenedor principal -->
    <div class="register-container">

        <!-- Nombre de la aplicación -->
        <h1>

            Darling Life Planner 🌸

        </h1>

        <!-- Mensaje principal -->
        <h2>

            Crear una cuenta

        </h2>

        <!-- Formulario -->
        <form th:action="@{/register}"
              th:object="${user}"
              method="post">

            <!-- Nombre -->
            <label>

                Nombre completo

            </label>

            <input
                    type="text"
                    th:field="*{name}"
                    placeholder="Ingrese su nombre">


            <!-- Correo -->
            <label>

                Correo electrónico

            </label>

            <input
                    type="email"
                    th:field="*{email}"
                    placeholder="Ingrese su correo">


            <!-- Contraseña -->
            <label>

                Contraseña

            </label>

            <input
                    type="password"
                    th:field="*{password}"
                    placeholder="Ingrese su contraseña">


            <!-- Confirmar contraseña -->
            <label>

                Confirmar contraseña

            </label>

            <input
                    type="password"
                    placeholder="Repita la contraseña">


            <!-- Botón -->
            <button type="submit">

                Registrarse

            </button>

        </form>

        <!-- Enlace hacia login -->
        <p>

            ¿Ya tienes una cuenta?

            <a th:href="@{/login}">

                Iniciar sesión

            </a>

        </p>

    </div>

</body>

</html>
