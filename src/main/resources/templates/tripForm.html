
<!--
==============================================================================
File: tripForm.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page provides the form for creating and editing trips within the Darling
Life Planner application. Users can enter the destination, departure date, and
return date of a trip. The form is integrated with Spring Boot and Thymeleaf
to bind trip information and submit it securely to the backend for processing.

Main Features:
- Displays a form for creating or updating a trip.
- Allows users to enter the travel destination.
- Collects departure and return dates.
- Includes a hidden field to support editing existing trips.
- Submits trip information to the corresponding Spring Boot controller.
- Provides a navigation link to return to the trips management page.
- Integrates the shared sidebar and navigation bar fragments for a consistent
  application layout.

Technologies:
- HTML5
- CSS3
- Thymeleaf
- Spring Boot MVC

Author: Darling Chaves
==============================================================================
-->


<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nuevo Viaje</title>

    <!-- CSS principal -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <!-- Sidebar -->
    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <!-- Navbar -->
    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <!-- Formulario -->
    <link rel="stylesheet"
          th:href="@{/css/tripForm.css}">

</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        <div class="main-content">

            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}">
            </div>

            <!-- Formulario -->
            <div class="form-container">

                <h1>

                    ✈️ Nuevo Viaje

                </h1>

                <form th:action="@{/saveTrip}"
                      th:object="${trip}"
                      method="post">

                    <!-- Id oculto -->
                    <input type="hidden"
                           th:field="*{id}">


                    <!-- Destino -->
                    <label>

                        Destino

                    </label>

                    <input type="text"
                           th:field="*{destination}"
                           required>


                    <!-- Fecha de salida -->
                    <label>

                        Fecha de salida

                    </label>

                    <input type="date"
                           th:field="*{departureDate}"
                           required>


                    <!-- Fecha de regreso -->
                    <label>

                        Fecha de regreso

                    </label>

                    <input type="date"
                           th:field="*{returnDate}"
                           required>


                    <!-- Botón guardar -->
                    <button type="submit">

                        Guardar viaje

                    </button>


                    <!-- Regresar -->
                    <a th:href="@{/tripsPage}">

                        Volver a viajes

                    </a>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
