<!--
========================================================
NEW / EDIT COURSE FORM

Single form used for both creating and editing a course.
========================================================
-->



<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nuevo Curso</title>

    <!-- CSS principal -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <!-- Sidebar -->
    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <!-- Navbar -->
    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <!-- Formulario -->
    <link rel="stylesheet"
          th:href="@{/css/courseForm.css}">

</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        <div class="main-content">

            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}">
            </div>

            <div class="form-container">

                <h1>

                    📚 Nuevo Curso

                </h1>

                <form th:action="@{/saveCourse}"
                      th:object="${course}"
                      method="post">

                    <!-- Id oculto -->
                    <input type="hidden"
                           th:field="*{id}">


                    <!-- Nombre -->
                    <label>

                        Nombre del curso

                    </label>

                    <input type="text"
                           th:field="*{name}"
                           required>


                    <!-- Código -->
                    <label>

                        Código

                    </label>

                    <input type="text"
                           th:field="*{code}"
                           required>


                    <!-- Créditos -->
                    <label>

                        Créditos

                    </label>

                    <input type="number"
                           th:field="*{credits}"
                           required>


                    <!-- Profesor -->
                    <label>

                        Profesor

                    </label>

                    <input type="text"
                           th:field="*{teacher}"
                           required>


                    <!-- Botón -->
                    <button type="submit">

                        Guardar curso

                    </button>


                    <!-- Volver -->
                    <a th:href="@{/coursesPage}">

                        Volver a cursos

                    </a>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
