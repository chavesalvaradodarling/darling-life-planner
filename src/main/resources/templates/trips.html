<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mis Viajes</title>

    <!-- CSS principal -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <!-- Sidebar -->
    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <!-- Navbar -->
    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <!-- Trips -->
    <link rel="stylesheet"
          th:href="@{/css/trips.css}">

</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        <!-- Contenido principal -->
        <div class="main-content">

            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}">
            </div>

            <!-- Contenedor -->
            <div class="activities-container">

                <h1>

                    ✈️ Mis Viajes

                </h1>

                <!-- Botón -->
                <a th:href="@{/newTrip}"
                   class="new-activity">

                    + Nuevo viaje

                </a>

                <!-- Tabla -->
                <table>

                    <thead>

                        <tr>

                            <th>Destino</th>

                            <th>Fecha de salida</th>

                            <th>Fecha de regreso</th>

                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="trip : ${trips}">

                            <!-- Destino -->
                            <td th:text="${trip.destination}">
                            </td>

                            <!-- Fecha salida -->
                            <td th:text="${trip.departureDate}">
                            </td>

                            <!-- Fecha regreso -->
                            <td th:text="${trip.returnDate}">
                            </td>

                            <!-- Acciones -->
                            <td>

                                <!-- Editar -->
                                <a class="action-edit"
                                   th:href="@{/editTrip/{id}(id=${trip.id})}">

                                    ✏️ Editar

                                </a>

                                &nbsp;

                                <!-- Eliminar -->
                                <a class="action-delete"
                                   th:href="@{/deleteTrip/{id}(id=${trip.id})}"

                                   onclick="return confirm('¿Desea eliminar este viaje?')">

                                    🗑️ Eliminar

                                </a>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
