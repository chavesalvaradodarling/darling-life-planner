
<!--
==============================================================================
File: settingsPage.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page displays the Settings Management panel of the Darling Life Planner
application. It allows users to view, create, edit, and delete application
settings, such as the selected visual theme. The page presents all registered
settings in a structured table and provides quick access to the available
management actions through an intuitive interface.

Main Features:
- Displays a list of all saved application settings.
- Shows the currently selected theme for each configuration.
- Allows users to create a new configuration.
- Provides options to edit or delete existing settings.
- Includes a confirmation dialog before deleting a configuration.
- Uses Thymeleaf to dynamically render data from the backend.
- Integrates the shared sidebar and navigation bar fragments for a consistent
  user experience.


==============================================================================
-->


<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuraciones</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/settingsPage.css}">
</head>
<body>

<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="activities-container">
            <h1 style="color: var(--text-title); transition: color 0.3s ease;">⚙️ Panel de Configuración</h1>

            <a th:href="@{/newSettings}" class="new-activity">
                + Nueva configuración
            </a>

            <table>
                <thead>
                    <tr>
                        <th>Tema Seleccionado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="settings : ${settingsList}">
                        <td th:text="${settings.theme}"></td>
                        <td>
                            <a class="action-edit" th:href="@{/editSettings/{id}(id=${settings.id})}">
                                ✏️ Editar
                            </a>
                            &nbsp;
                            <a class="action-delete" th:href="@{/deleteSettings/{id}(id=${settings.id})}"
                               onclick="return confirm('¿Desea eliminar esta configuración?')">
                                🗑️ Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
