<!--
==============================================================================
File: movies.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page displays the Movie Management module of the Darling Life Planner
application. It allows users to organize and manage their personal movie
collection by viewing, creating, editing, and deleting movie records. Each
movie entry includes information such as its title, genre, duration, and
poster image. The data is dynamically retrieved and rendered using Thymeleaf.

Main Features:
- Displays a complete list of registered movies.
- Shows detailed information for each movie, including:
  • Movie title
  • Genre
  • Duration in minutes
  • Poster or cover image
- Allows users to add a new movie to their collection.
- Provides options to edit or delete existing movie records.
- Displays a confirmation dialog before deleting a movie.
- Dynamically renders movie information using Thymeleaf.
- Integrates the shared sidebar and navigation bar fragments to maintain a
  consistent application layout and navigation experience.

==============================================================================
-->


<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mis Películas</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <link rel="stylesheet"
          th:href="@{/css/movies.css}">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}">
    </div>


    <!-- Contenido principal -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}">
        </div>


        <!-- Fondo de películas -->
        <div class="movies-background">

            <!-- Contenido -->
            <div class="activities-container">

                <h1>

                    🎬 Mis Películas

                </h1>


                <a th:href="@{/newMovie}"
                   class="new-activity">

                    + Nueva película

                </a>


                <table>

                    <thead>

                    <tr>

                        <th>Título</th>

                        <th>Género</th>

                        <th>Duración</th>

                        <th>Imagen</th>

                        <th>Acciones</th>

                    </tr>

                    </thead>


                    <tbody>

                    <tr th:each="movie : ${movies}">

                        <td th:text="${movie.title}">
                        </td>

                        <td th:text="${movie.genre}">
                        </td>

                        <td>

                            <span th:text="${movie.duration}">
                            </span>

                            min

                        </td>

                        <td>

                            <img th:src="${movie.image}"
                                 width="80"
                                 height="120"
                                 style="border-radius:10px;
                                        object-fit:cover;">

                        </td>

                        <td>

                            <a class="action-edit"
                               th:href="@{/editMovie/{id}(id=${movie.id})}">

                                ✏️ Editar

                            </a>

                            &nbsp;

                            <a class="action-delete"
                               th:href="@{/deleteMovie/{id}(id=${movie.id})}"
                               onclick="return confirm('¿Desea eliminar esta película?')">

                                🗑️ Eliminar

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>

</html>
