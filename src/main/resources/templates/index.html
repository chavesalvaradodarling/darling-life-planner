
<!--
  Home dashboard page.

  Provided model attributes (from IndexController):
    - categoryCards   : List<CategoryCardDTO>, used to render one colored
                         stat card per category with logged real hours
                         (status COMPLETED or PARTIALLY_COMPLETED only)
    - totalActivities : total number of the user's activities (any status)
    - categoryLabels / categoryValues : parallel lists feeding the
                         Chart.js pie chart at the bottom of the page

  Each card's background color comes from a CSS class built dynamically
  as "card card-<lowercased category.color>" (e.g. card-azul), matched
  against the named classes in cards.css. If a category has no color set,
  it falls back to "morado" (purple).
-->

<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>Darling Life Planner</title>

    <!-- CSS principal -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- CSS del menú lateral -->
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- CSS de la barra superior -->
    <link rel="stylesheet" th:href="@{/css/navbar.css}">

    <!-- CSS de las tarjetas -->
    <link rel="stylesheet" th:href="@{/css/cards.css}">

    <!-- CSS del plan del día -->
    <link rel="stylesheet" th:href="@{/css/dailyplan.css}">

    <!-- CSS de metas -->
    <link rel="stylesheet" th:href="@{/css/goals.css}">

    <!-- CSS de próximas actividades -->
    <link rel="stylesheet" th:href="@{/css/upcoming.css}">

    <!-- CSS del dashboard -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <!-- CSS del calendario -->
    <link rel="stylesheet" th:href="@{/css/calendar.css}">

    <!-- CSS del botón flotante -->
    <link rel="stylesheet" th:href="@{/css/floatingButton.css}">

    <!-- CSS del gráfico -->
    <link rel="stylesheet" th:href="@{/css/chart.css}">

</head>

<body>

    <!-- Contenedor principal -->
    <div class="container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        <!-- Contenido principal -->
        <div class="main-content">

            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}">
            </div>

            <!-- Tarjetas estadísticas -->
            <div class="cards">

               <div th:each="card : ${categoryCards}"
     th:if="${card != null}"
     th:class="'card card-' + ${#strings.toLowerCase(card.color ?: 'morado')}">

    <div class="card-icon" th:text="${card.icon}"></div>
    <h3 th:text="${card.name}"></h3>
    <h2 th:text="${card.hours} + ' h'"></h2>

</div>

                <!-- Total actividades -->
                <div class="card">

                    <div class="card-icon">
                        🎯
                    </div>

                    <h3>Total de actividades</h3>

                    <h2 th:text="${totalActivities}">
                    </h2>

                </div>

            </div>


            <!-- Sección central -->
            <div class="dashboard-content">

                <!-- Plan del día -->
                <div th:replace="~{fragments/dailyplan :: dailyPlan}">
                </div>


                <!-- Panel derecho -->
                <div class="right-panel">

                    <!-- Metas -->
                    <div th:replace="~{fragments/goals :: goals}">
                    </div>

                    <!-- Próximas actividades -->
                    <div th:replace="~{fragments/upcoming :: upcoming}">
                    </div>

                </div>

            </div>





            <!-- Gráfico -->
            <div th:replace="~{fragments/chart :: chart}">
            </div>

        </div>

    </div>


    <!-- Botón flotante -->
    <div th:replace="~{fragments/floatingButton :: floatingButton}">
    </div>


    <!-- Librería Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">

        const labels = /*[[${categoryLabels}]]*/[];

        const data = /*[[${categoryValues}]]*/[];

        const colors = [
            "#C9A7EB",
            "#A8D8EA",
            "#FFD6A5",
            "#FFCAD4",
            "#B5EAD7",
            "#F7D6E0",
            "#CDE7BE",
            "#BDE0FE",
            "#E4C1F9",
            "#FFC8A2"
        ];

        new Chart(

            document.getElementById("hoursChart"),

            {

                type: "pie",

                data: {

                    labels: labels,

                    datasets: [

                        {

                            data: data,

                            backgroundColor:
                                labels.map((x, i) =>
                                    colors[i % colors.length])

                        }

                    ]

                },

                options: {

                    responsive: true,

                    maintainAspectRatio: true

                }

            }

        );

    </script>

</body>

</html>
