<!--
  Goals widget fragment (home dashboard).

  Currently always renders the empty-state variant regardless of whether
  the user has goals, inviting them to create their first one. To show
  real goal progress here, this fragment would need to receive an
  "activeGoals"/"completedGoals" attribute similar to GoalViewController's
  /goalsPage logic.

  Included via: th:replace="~{fragments/goals :: goals}"
-->


<div class="goals" th:fragment="goals">

    <h2>⭐ Mis metas</h2>

    <div class="goals-empty">
        <span class="goals-empty-icon">🎯</span>
        <p class="goals-empty-title">Sin metas aún</p>
        <p class="goals-empty-sub">Agrega tu primera meta para ver el progreso aquí</p>
        <a th:href="@{/goalsPage}" class="goals-button">+ Nueva meta</a>
    </div>

</div>
