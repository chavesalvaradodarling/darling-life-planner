<!--
  Application sidebar / main navigation fragment.

  Includes an inline immediate-execution script that reads the saved
  theme preference from localStorage and applies the [data-theme="Oscuro"]
  attribute to <html> BEFORE the rest of the page renders. This prevents
  a flash of the light theme on page load when the user has dark mode
  selected.

  Navigation is grouped into four sections: Home, Categories (the user's
  trackable entities), Analysis, and User account actions.

  Included via: th:replace="~{fragments/sidebar :: sidebar}"
-->
<div class="sidebar" th:fragment="sidebar">

    <!-- SCRIPT DE EJECUCIÓN INMEDIATA PARA EVITAR EL PARPADEO BLANCO -->
    <script>
        (function () {
            const temaGlobal = localStorage.getItem('theme');
            if (temaGlobal === 'Oscuro') {
                document.documentElement.setAttribute('data-theme', 'Oscuro');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        })();
    </script>

    <!-- Nombre de la aplicación -->
    <h2>
        Darling Life Planner 🌸
    </h2>

    <!-- SECCIÓN INICIO -->
    <h4>
        INICIO
    </h4>

            </a>
        </li>

            </a>
        </li>
    </ul>
