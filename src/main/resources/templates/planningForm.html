<!--
==============================================================================
File: planningForm.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page provides the Planning Form module of the Darling Life Planner
application. It allows users to create or edit planning records by entering
essential information such as the planning name, description, objective,
planning type, and execution period. The form is integrated with Spring Boot
and Thymeleaf to bind planning data and submit it securely to the backend for
processing.

Main Features:
- Displays a form for creating or updating a planning.
- Allows users to define the planning name and description.
- Enables users to specify the planning objective.
- Provides multiple planning types, including:
  • Weekly
  • Monthly
  • Bimonthly
  • Semester
- Allows users to select the planning start and end dates.
- Includes a hidden identifier to support editing existing planning records.
- Submits planning information to the corresponding Spring Boot controller.
- Provides a navigation link to return to the Planning Management page.
- Integrates the shared sidebar and navigation bar fragments to maintain a
  consistent application layout and user experience.


==============================================================================
-->


<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nueva Planificación</title>

    <!-- CSS principal -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <!-- Sidebar -->
    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <!-- Navbar -->
    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <!-- Formulario -->
    <link rel="stylesheet"
          th:href="@{/css/planningForm.css}">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}">
    </div>

    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}">
        </div>

        <div class="form-container">

            <h1>

                📅 Nueva Planificación

            </h1>

            <form th:action="@{/savePlanning}"
                  th:object="${planning}"
                  method="post">

                <!-- Id oculto -->
                <input type="hidden"
                       th:field="*{id}">


                <!-- Nombre -->
                <label>

                    Nombre

                </label>

                <input type="text"
                       th:field="*{name}"
                       required>


                <!-- Descripción -->
                <label>

                    Descripción

                </label>

                <input type="text"
                       th:field="*{description}"
                       required>


                <!-- Objetivo -->
                <label>

                    Objetivo

                </label>

                <input type="text"
                       th:field="*{goal}"
                       required>


                <!-- Tipo -->
                <label>

                    Tipo

                </label>

                <select th:field="*{type}">

                    <option value="WEEKLY">

                        Semanal

                    </option>

                    <option value="MONTHLY">

                        Mensual

                    </option>

                    <option value="BIMONTHLY">

                        Bimestral

                    </option>

                    <option value="SEMESTER">

                        Semestral

                    </option>

                </select>


                <!-- Fecha inicio -->
                <label>

                    Fecha de inicio

                </label>

                <input type="date"
                       th:field="*{startDate}"
                       required>


                <!-- Fecha final -->
                <label>

                    Fecha final

                </label>

                <input type="date"
                       th:field="*{endDate}"
                       required>


                <!-- Botón -->
                <button type="submit">

                    Guardar planificación

                </button>


                <!-- Volver -->
                <a th:href="@{/planningsPage}">

                    Volver a planificaciones

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
