<!--
==============================================================================
File: profilesPage.html
Project: Darling Life Planner
------------------------------------------------------------------------------
Description:
This page displays the Profile Management module of the Darling Life Planner
application. It allows users to manage their personal profiles by viewing,
creating, editing, and deleting profile information. All profile data is
retrieved dynamically from the backend and presented in a structured table
using Thymeleaf.

Main Features:
- Displays a list of all registered user profiles.
- Shows personal and academic information, including full name, email,
  university, and career.
- Allows users to create a new profile.
- Provides options to edit or delete existing profiles.
- Displays a confirmation dialog before deleting a profile.
- Uses Thymeleaf to dynamically render profile information from the backend.
- Integrates the shared sidebar and navigation bar fragments to provide a
  consistent navigation experience throughout the application.


==============================================================================
-->



<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mis Perfiles</title>

    <!-- CSS principal -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <!-- Sidebar -->
    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <!-- Navbar -->
    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <!-- CSS de perfiles -->
    <link rel="stylesheet"
          th:href="@{/css/profilesPage.css}">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}">
    </div>

    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}">
        </div>

        <div class="activities-container">

            <h1>

                👤 Mis Perfiles

            </h1>


            <!-- Botón -->
            <a th:href="@{/newProfile}"
               class="new-activity">

                + Nuevo perfil

            </a>


            <!-- Tabla -->
            <table>

                <thead>

                    <tr>

                        <th>Nombre</th>

                        <th>Correo</th>

                        <th>Universidad</th>

                        <th>Carrera</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody>

                    <tr th:each="profile : ${profiles}">

                        <!-- Nombre -->
                        <td th:text="${profile.fullName}">
                        </td>

                        <!-- Correo -->
                        <td th:text="${profile.email}">
                        </td>

                        <!-- Universidad -->
                        <td th:text="${profile.university}">
                        </td>

                        <!-- Carrera -->
                        <td th:text="${profile.career}">
                        </td>

                        <!-- Acciones -->
                        <td>

                            <!-- Editar -->
                            <a class="action-edit"
                               th:href="@{/editProfile/{id}(id=${profile.id})}">

                                ✏️ Editar

                            </a>

                            &nbsp;

                            <!-- Eliminar -->
                            <a class="action-delete"
                               th:href="@{/deleteProfile/{id}(id=${profile.id})}"

                               onclick="return confirm('¿Desea eliminar este perfil?')">

                                🗑️ Eliminar

                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
