<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Categorías</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/categories.css}">
</head>
<body>

    <div class="container">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="main-content">
            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <div class="activities-container">
                <h1 style="color: var(--text-title); transition: color 0.3s ease;">
                    🏷️ Mis Categorías
                </h1>

                <a th:href="@{/newCategory}" class="new-activity">
                    + Nueva categoría
                </a>

                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Color</th>
                            <th>Icono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category : ${categories}">
                            <td th:text="${category.name}"></td>
                            <td th:text="${category.color}"></td>
                            <td th:text="${category.icon}"></td>
                            <td>
                                <a class="action-edit" th:href="@{/editCategory/{id}(id=${category.id})}">
                                    ✏️ Editar
                                </a>
                                &nbsp;
                                <a class="action-delete" th:href="@{/deleteCategory/{id}(id=${category.id})}"
                                   onclick="return confirm('¿Desea eliminar esta categoría?')">
                                    🗑️ Eliminar
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
