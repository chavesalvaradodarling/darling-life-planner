<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mis Categorías</title>

    <!-- CSS principal -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <!-- Sidebar -->
    <link rel="stylesheet"
          th:href="@{/css/sidebar.css}">

    <!-- Navbar -->
    <link rel="stylesheet"
          th:href="@{/css/navbar.css}">

    <!-- CSS categorías -->
    <link rel="stylesheet"
          th:href="@{/css/categories.css}">

</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        <!-- Contenido principal -->
        <div class="main-content">

            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}">
            </div>

            <!-- Contenedor -->
            <div class="activities-container">

                <h1>

                    🏷️ Mis Categorías

                </h1>

                <!-- Botón nueva categoría -->
                <a th:href="@{/newCategory}"
                   class="new-activity">

                    + Nueva categoría

                </a>

                <!-- Tabla -->
                <table>

                    <thead>

                        <tr>

                            <th>Nombre</th>

                            <th>Color</th>

                            <th>Icono</th>

                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="category : ${categories}">

                            <!-- Nombre -->
                            <td th:text="${category.name}">
                            </td>

                            <!-- Color -->
                            <td th:text="${category.color}">
                            </td>

                            <!-- Icono -->
                            <td th:text="${category.icon}">
                            </td>

                            <!-- Acciones -->
                            <td>

                                <!-- Editar -->
                                <a class="action-edit"
                                   th:href="@{/editCategory/{id}(id=${category.id})}">

                                    ✏️ Editar

                                </a>

                                &nbsp;

                                <!-- Eliminar -->
                                <a class="action-delete"
                                   th:href="@{/deleteCategory/{id}(id=${category.id})}"

                                   onclick="return confirm('¿Desea eliminar esta categoría?')">

                                    🗑️ Eliminar

                                </a>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
