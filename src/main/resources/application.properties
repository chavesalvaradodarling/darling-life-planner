spring.application.name=springboot-aplicacion
# Nombre de la aplicación

# Conexión con MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/darling_life_planner
spring.datasource.username=root
spring.datasource.password=Root123_

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate creará y actualizará las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola
spring.jpa.show-sql=true

# Formatear las consultas SQL
spring.jpa.properties.hibernate.format_sql=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB